name: Build Android APK

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: 构建 APK
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: 设置 Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 安装依赖
        run: flutter pub get

      - name: 构建 APK
        run: flutter build apk --release

      - name: 上传 APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: 更新 Release APK
        if: github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APK_PATH="build/app/outputs/flutter-apk/app-release.apk"
          REPO="${{ github.repository }}"
          RELEASE_ID=$(curl -s -H "Authorization: token $GITHUB_TOKEN"             "https://api.github.com/repos/$REPO/releases/latest" | python3 -c "import sys,json; print(json.load(sys.stdin).get('id',''))")
          if [ -z "$RELEASE_ID" ]; then
            echo "No release found, skipping upload"
            exit 0
          fi
          echo "Release ID: $RELEASE_ID"
          OLD_ASSET_ID=$(curl -s -H "Authorization: token $GITHUB_TOKEN"             "https://api.github.com/repos/$REPO/releases/$RELEASE_ID/assets" | python3 -c "
          import sys,json
          for a in json.load(sys.stdin):
            if a['name'].endswith('.apk'): print(a['id'])
          ")
          if [ -n "$OLD_ASSET_ID" ]; then
            curl -s -X DELETE -H "Authorization: token $GITHUB_TOKEN"               "https://api.github.com/repos/$REPO/releases/assets/$OLD_ASSET_ID"
            echo "Deleted old APK: $OLD_ASSET_ID"
          fi
          FILENAME="koubo-app-v1.0.0.apk"
          UPLOAD_URL="https://uploads.github.com/repos/$REPO/releases/$RELEASE_ID/assets"
          curl -s -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: application/vnd.android.package-archive" \
            "$UPLOAD_URL?name=$FILENAME" \
            --data-binary @"$APK_PATH" | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'Uploaded: {d.get("name","ERROR")} ({d.get("size",0)//1024//1024}MB)')"
          echo "Done!"

      - name: 创建 GitHub Release（tag推送时）
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
