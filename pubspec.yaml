name: koubo_app
description: 口播智能体 - AI口播文案创作助手，支持文案提取、AI改写、法务审核、语音合成、数字人视频生成
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 状态管理
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # 网络请求
  dio: ^5.4.3+1

  # 本地数据库
  sqflite: ^2.3.3+1
  path: ^1.9.0

  # 安全存储（API Key加密）
  flutter_secure_storage: ^9.2.2

  # 轻量级KV存储（模型偏好等配置）
  shared_preferences: ^2.2.3

  # 录音
  record: ^5.1.0

  # 音频播放
  just_audio: ^0.9.37

  # 视频播放
  video_player: ^2.8.6

  # WebSocket（Edge-TTS使用）
  web_socket_channel: ^2.4.0

  # 图片选择
  image_picker: ^1.0.7

  # 权限管理
  permission_handler: ^11.3.1

  # 文件路径
  path_provider: ^2.1.3

  # 文本Diff对比
  diff_match_patch: ^0.4.1

  # UI组件
  cupertino_icons: ^1.0.8
  flutter_spinkit: ^5.2.1
  cached_network_image: ^3.3.1

  # 工具
  uuid: ^4.4.0
  intl: ^0.19.0
  share_plus: ^8.0.3
  url_launcher: ^6.2.6
  logger: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true
  assets:
    - assets/images/
